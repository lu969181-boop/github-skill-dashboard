name: Update GitHub Trend Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: rankings
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore ranking snapshots
        uses: actions/cache@v4
        with:
          path: data/snapshots
          key: ranking-snapshots-${{ github.run_id }}
          restore-keys: |
            ranking-snapshots-

      - name: Generate rankings
        run: npm run generate:rankings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit refreshed rankings
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json
          if git diff --cached --quiet; then
            echo "No ranking changes to commit."
          else
            git commit -m "Refresh rankings data"
            git push
          fi

      - name: Build static site
        run: npm run build
